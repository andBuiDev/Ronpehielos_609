<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Actividad Rompe Hielos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f5f4f0; min-height: 100vh; padding: 2rem 1rem; }

.rh-wrap {
  font-family: 'Nunito', sans-serif;
  max-width: 700px;
  margin: 0 auto;
  padding: 0 1rem 2rem;
}

.rh-header {
  text-align: center;
  padding: 2rem 1rem 1.5rem;
}

.rh-ice {
  font-size: 56px;
  display: block;
  margin-bottom: 8px;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
}

.rh-title {
  font-family: 'Space Mono', monospace;
  font-size: 30px;
  font-weight: 700;
  color: #1a1a1a;
  letter-spacing: -1px;
  margin-bottom: 4px;
}

.rh-subtitle {
  font-size: 13px;
  color: #888;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 14px;
}

.rh-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: center;
  margin-top: 10px;
}

.rh-tag {
  font-size: 11px;
  font-weight: 700;
  padding: 3px 11px;
  border-radius: 99px;
  letter-spacing: 0.3px;
}

.t-py  { background: #EEEDFE; color: #3C3489; }
.t-sql { background: #E1F5EE; color: #085041; }
.t-db  { background: #E6F1FB; color: #0C447C; }
.t-web { background: #FAEEDA; color: #633806; }

.rh-progress-wrap {
  margin: 1.4rem 0 0.5rem;
  display: flex;
  align-items: center;
  gap: 10px;
}

.rh-prog-label {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: #888;
  white-space: nowrap;
}

.rh-prog-bar {
  flex: 1;
  height: 8px;
  background: #e0ddd6;
  border-radius: 99px;
  overflow: hidden;
}

.rh-prog-fill {
  height: 100%;
  border-radius: 99px;
  background: linear-gradient(90deg, #7F77DD, #5DCAA5);
  transition: width 0.5s cubic-bezier(.4,0,.2,1);
}

.rh-score-pill {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  background: #EEEDFE;
  color: #3C3489;
  padding: 3px 12px;
  border-radius: 99px;
  white-space: nowrap;
  font-weight: 700;
}

.question-card {
  background: #fff;
  border: 1px solid #e8e6e0;
  border-radius: 18px;
  padding: 1.6rem;
  margin: 1rem 0;
  position: relative;
  overflow: hidden;
  animation: slideIn 0.35s cubic-bezier(.4,0,.2,1);
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}

.q-accent {
  position: absolute;
  top: 0; left: 0;
  width: 5px;
  height: 100%;
  border-radius: 18px 0 0 18px;
}

.accent-py  { background: #7F77DD; }
.accent-sql { background: #1D9E75; }
.accent-db  { background: #378ADD; }
.accent-web { background: #BA7517; }

.q-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
  padding-left: 10px;
}

.q-num {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: #aaa;
}

.q-text {
  font-size: 18px;
  font-weight: 800;
  color: #1a1a1a;
  line-height: 1.45;
  padding-left: 10px;
  margin-bottom: 1.4rem;
}

.opts-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

@media (max-width: 480px) {
  .opts-grid { grid-template-columns: 1fr; }
}

.opt-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 13px 15px;
  background: #f5f4f0;
  border: 2px solid #e0ddd6;
  border-radius: 12px;
  cursor: pointer;
  font-family: 'Nunito', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: #1a1a1a;
  text-align: left;
  transition: all 0.18s ease;
  width: 100%;
}

.opt-btn:hover:not(:disabled) {
  border-color: #7F77DD;
  background: #EEEDFE;
  color: #3C3489;
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(127,119,221,0.2);
}

.opt-letter {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: #fff;
  border: 2px solid #ccc;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
  transition: all 0.18s;
}

.opt-btn:hover:not(:disabled) .opt-letter {
  background: #7F77DD;
  border-color: #7F77DD;
  color: white;
}

.opt-btn.correct {
  background: #EAF3DE;
  border-color: #639922;
  color: #27500A;
  transform: scale(1.02);
  box-shadow: 0 4px 14px rgba(99,153,34,0.2);
}

.opt-btn.correct .opt-letter {
  background: #639922;
  border-color: #639922;
  color: white;
}

.opt-btn.wrong {
  background: #FCEBEB;
  border-color: #E24B4A;
  color: #501313;
}

.opt-btn.wrong .opt-letter {
  background: #E24B4A;
  border-color: #E24B4A;
  color: white;
}

.opt-btn.reveal {
  background: #EAF3DE;
  border-color: #639922;
  color: #27500A;
  opacity: 0.7;
}

.opt-btn.reveal .opt-letter {
  background: #639922;
  border-color: #639922;
  color: white;
}

.opt-btn:disabled { cursor: default; }

.feedback-bar {
  margin-top: 14px;
  padding: 12px 16px;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 10px;
  animation: popIn 0.3s cubic-bezier(.4,0,.2,1);
}

@keyframes popIn {
  from { opacity: 0; transform: scale(0.94); }
  to   { opacity: 1; transform: scale(1); }
}

.feedback-bar.ok   { background: #EAF3DE; color: #27500A; }
.feedback-bar.fail { background: #FCEBEB; color: #501313; }

.fb-icon { font-size: 22px; flex-shrink: 0; }

.next-row {
  display: flex;
  justify-content: flex-end;
  margin-top: 1rem;
}

.next-btn {
  font-family: 'Space Mono', monospace;
  font-size: 13px;
  font-weight: 700;
  padding: 13px 28px;
  background: #7F77DD;
  color: white;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.18s;
  letter-spacing: 0.3px;
  display: none;
  box-shadow: 0 4px 14px rgba(127,119,221,0.35);
}

.next-btn:hover { background: #534AB7; transform: translateY(-2px); }
.next-btn:active { transform: scale(0.97); }

.results-card {
  background: #fff;
  border: 1px solid #e8e6e0;
  border-radius: 20px;
  padding: 2.8rem 2rem;
  text-align: center;
  margin: 1rem 0;
  animation: slideIn 0.4s cubic-bezier(.4,0,.2,1);
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}

.results-emoji { font-size: 64px; display: block; margin-bottom: 14px; }

.results-big {
  font-family: 'Space Mono', monospace;
  font-size: 80px;
  font-weight: 700;
  color: #7F77DD;
  line-height: 1;
}

.results-of {
  font-size: 18px;
  color: #888;
  font-weight: 600;
  margin-bottom: 8px;
}

.results-pct {
  display: inline-block;
  font-family: 'Space Mono', monospace;
  font-size: 14px;
  padding: 5px 18px;
  border-radius: 99px;
  margin-bottom: 18px;
  font-weight: 700;
}

.results-msg {
  font-size: 22px;
  font-weight: 900;
  color: #1a1a1a;
  margin-bottom: 8px;
}

.results-sub {
  font-size: 15px;
  color: #888;
  margin-bottom: 2rem;
}

.breakdown {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-bottom: 2rem;
  max-width: 320px;
  margin-left: auto;
  margin-right: auto;
}

.bk-item {
  padding: 14px;
  border-radius: 14px;
  border: 1px solid #e8e6e0;
  background: #f5f4f0;
}

.bk-label { font-size: 11px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: #999; margin-bottom: 4px; }
.bk-val   { font-family: 'Space Mono', monospace; font-size: 28px; font-weight: 700; }

.restart-btn {
  font-family: 'Space Mono', monospace;
  font-size: 14px;
  font-weight: 700;
  padding: 15px 36px;
  background: #7F77DD;
  color: white;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  letter-spacing: 0.3px;
  transition: all 0.18s;
  box-shadow: 0 4px 14px rgba(127,119,221,0.35);
}

.restart-btn:hover { background: #534AB7; transform: translateY(-2px); }

.confetti-piece {
  position: fixed;
  animation: confettiFall linear forwards;
  pointer-events: none;
  z-index: 9999;
}

@keyframes confettiFall {
  0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}
</style>
</head>
<body>

<div class="rh-wrap">
  <div class="rh-header">
    <span class="rh-ice">🧊</span>
    <div class="rh-title">Rompe Hielos</div>
    <div class="rh-subtitle">Actividad Interactiva</div>
    <div class="rh-tags">
      <span class="rh-tag t-py">Python</span>
      <span class="rh-tag t-sql">SQL</span>
      <span class="rh-tag t-db">Bases de datos</span>
      <span class="rh-tag t-web">Cloud / Web</span>
    </div>
  </div>

  <div class="rh-progress-wrap">
    <span class="rh-prog-label" id="prog-label">0 / 20</span>
    <div class="rh-prog-bar"><div class="rh-prog-fill" id="prog-fill" style="width:0%"></div></div>
    <span class="rh-score-pill" id="score-pill">✓ 0</span>
  </div>

  <div id="main-area"></div>
</div>

<script>
const QS = [
  { t:"py",  tag:"Python",          q:"¿Cuál es la forma correcta de importar NumPy en Python?",                                    opts:["import numpy","import numpy as np","include numpy","load numpy"],                                          ans:1 },
  { t:"py",  tag:"Python",          q:"¿Para qué sirve Matplotlib / pyplot?",                                                        opts:["Manejar bases de datos","Crear gráficas y visualizaciones","Conectarse a internet","Calcular estadísticas"], ans:1 },
  { t:"py",  tag:"Python",          q:"¿Cómo se importa solo la parte pyplot de Matplotlib?",                                        opts:["import plot from matplotlib","import matplotlib as plt","import matplotlib.pyplot as plt","from plot import matplotlib"], ans:2 },
  { t:"py",  tag:"Python",          q:"¿Qué es un Dataset?",                                                                         opts:["Un tipo de variable","Un conjunto de datos organizados","Un servidor en la nube","Una librería de Python"],  ans:1 },
  { t:"py",  tag:"Python",          q:"¿Qué crea np.array([1, 2, 3]) de NumPy?",                                                     opts:["Una lista de texto","Un arreglo numérico","Un archivo CSV","Una gráfica de barras"],                        ans:1 },
  { t:"py",  tag:"Python",          q:"¿Cuál es el resultado de np.mean([2, 4, 6])?",                                                opts:["2","4","6","12"],                                                                                           ans:1 },
  { t:"sql", tag:"SQL",             q:"¿Qué significa SQL?",                                                                         opts:["Super Query Language","Structured Query Language","System Queue Logic","Simple Query List"],               ans:1 },
  { t:"sql", tag:"SQL",             q:"¿Qué comando SQL se usa para obtener datos de una tabla?",                                    opts:["GET","FETCH","SELECT","PULL"],                                                                              ans:2 },
  { t:"sql", tag:"SQL",             q:"¿Qué es una clave primaria (Primary Key)?",                                                   opts:["Campo que puede repetirse","Campo que identifica de forma única cada registro","El primer campo siempre","Una contraseña"], ans:1 },
  { t:"sql", tag:"SQL",             q:"¿Para qué sirve una Foreign Key?",                                                            opts:["Encriptar datos","Relacionar dos tablas entre sí","Eliminar duplicados","Crear índices"],                    ans:1 },
  { t:"sql", tag:"SQL",             q:"¿Qué hace SELECT * FROM estudiantes?",                                                        opts:["Elimina todos los registros","Trae todos los campos y registros de la tabla","Crea una tabla nueva","Actualiza los datos"], ans:1 },
  { t:"sql", tag:"SQL",             q:"¿Cuál de estos es un ejemplo de base de datos relacional?",                                   opts:["MongoDB","Firebase","MySQL","Redis"],                                                                       ans:2 },
  { t:"sql", tag:"SQL",             q:"¿Qué comando SQL se usa para filtrar resultados?",                                            opts:["FILTER","SEARCH","WHERE","FIND"],                                                                           ans:2 },
  { t:"db",  tag:"Bases de datos",  q:"¿Qué es XAMPP?",                                                                             opts:["Un lenguaje de programación","Paquete con Apache, MySQL y PHP para desarrollo local","Una plataforma en la nube","Un editor de código"], ans:1 },
  { t:"db",  tag:"Bases de datos",  q:"¿Para qué se usa Navicat?",                                                                  opts:["Escribir código Python","Administrar bases de datos de forma visual","Crear páginas web","Hacer análisis estadísticos"], ans:1 },
  { t:"db",  tag:"Bases de datos",  q:"¿Qué es Supabase?",                                                                          opts:["Una librería de Python","Plataforma de base de datos en la nube con interfaz visual","Un editor de código","Un servidor web local"], ans:1 },
  { t:"db",  tag:"Bases de datos",  q:"En una base de datos, ¿qué es un campo (field)?",                                            opts:["Una fila completa","Columna que representa un atributo de los datos","Un archivo de respaldo","El nombre de la tabla"], ans:1 },
  { t:"web", tag:"Cloud / Web",     q:"¿Para qué sirve Vercel?",                                                                    opts:["Administrar bases MySQL","Desplegar y publicar aplicaciones web en la nube","Escribir código Python","Crear diseños gráficos"], ans:1 },
  { t:"web", tag:"Cloud / Web",     q:"¿Para qué se usa Netlify?",                                                                  opts:["Gestionar servidores físicos","Publicar sitios web estáticos en la nube","Crear bases de datos relacionales","Analizar datasets"], ans:1 },
  { t:"web", tag:"Cloud / Web",     q:"¿Qué significa que una plataforma esté 'en la nube'?",                                       opts:["Funciona solo cuando llueve","Datos almacenados en servidores remotos accesibles por internet","Usa lenguaje especial","Solo para grandes empresas"], ans:1 },
];

const tagClass  = { py:"t-py", sql:"t-sql", db:"t-db", web:"t-web" };
const accentCls = { py:"accent-py", sql:"accent-sql", db:"accent-db", web:"accent-web" };
const letters   = ["A","B","C","D"];

let cur = 0, score = 0, answered = false;

function updateProgress() {
  document.getElementById("prog-label").textContent = cur + " / " + QS.length;
  document.getElementById("prog-fill").style.width = Math.round((cur / QS.length) * 100) + "%";
  document.getElementById("score-pill").textContent = "✓ " + score;
}

function render() {
  updateProgress();
  const area = document.getElementById("main-area");
  if (cur >= QS.length) { renderResults(area); return; }
  const q = QS[cur];
  answered = false;

  area.innerHTML = `
    <div class="question-card">
      <div class="q-accent ${accentCls[q.t]}"></div>
      <div class="q-meta">
        <span class="q-num">Pregunta ${cur+1} de ${QS.length}</span>
        <span class="rh-tag ${tagClass[q.t]}">${q.tag}</span>
      </div>
      <p class="q-text">${q.q}</p>
      <div class="opts-grid" id="opts">
        ${q.opts.map((o,i) => `
          <button class="opt-btn" data-i="${i}" onclick="choose(${i})">
            <span class="opt-letter">${letters[i]}</span>
            <span>${o}</span>
          </button>`).join("")}
      </div>
      <div id="feedback"></div>
    </div>
    <div class="next-row">
      <button class="next-btn" id="nextbtn" onclick="next()">
        ${cur === QS.length - 1 ? "Ver resultados 🎉" : "Siguiente →"}
      </button>
    </div>
  `;
}

function choose(i) {
  if (answered) return;
  answered = true;
  const q = QS[cur];
  const btns = document.querySelectorAll(".opt-btn");

  btns.forEach((b, idx) => {
    b.disabled = true;
    if (idx === q.ans) b.classList.add(i === q.ans ? "correct" : "reveal");
    if (idx === i && i !== q.ans) b.classList.add("wrong");
  });

  const fb = document.getElementById("feedback");
  if (i === q.ans) {
    score++;
    updateProgress();
    fb.innerHTML = `<div class="feedback-bar ok"><span class="fb-icon">✅</span><span>¡Correcto! Muy bien.</span></div>`;
    burst();
  } else {
    fb.innerHTML = `<div class="feedback-bar fail"><span class="fb-icon">❌</span><span>Incorrecto. La correcta era: <strong>${letters[q.ans]}. ${q.opts[q.ans]}</strong></span></div>`;
  }
  document.getElementById("nextbtn").style.display = "inline-block";
}

function next() { cur++; render(); }

function renderResults(area) {
  const pct = Math.round((score / QS.length) * 100);
  let emoji, msg, sub, pctBg, pctColor;
  if (pct >= 85) { emoji="🏆"; msg="¡Excelente! Dominas el tema."; sub="Claramente pusiste mucha atención en clase."; pctBg="#EAF3DE"; pctColor="#27500A"; }
  else if (pct >= 60) { emoji="👏"; msg="¡Buen trabajo! Vas por buen camino."; sub="Repasa los temas donde fallaste y vuelve a intentarlo."; pctBg="#FAEEDA"; pctColor="#633806"; }
  else { emoji="💪"; msg="¡Sigue adelante, tú puedes!"; sub="Revisa los conceptos y vuelve a intentar este quiz."; pctBg="#FCEBEB"; pctColor="#501313"; }

  updateProgress();
  area.innerHTML = `
    <div class="results-card">
      <span class="results-emoji">${emoji}</span>
      <div class="results-big">${score}</div>
      <div class="results-of">de ${QS.length} preguntas correctas</div>
      <span class="results-pct" style="background:${pctBg};color:${pctColor}">${pct}% de aciertos</span>
      <div class="results-msg">${msg}</div>
      <div class="results-sub">${sub}</div>
      <div class="breakdown">
        <div class="bk-item"><div class="bk-label">Correctas</div><div class="bk-val" style="color:#639922">${score}</div></div>
        <div class="bk-item"><div class="bk-label">Incorrectas</div><div class="bk-val" style="color:#E24B4A">${QS.length - score}</div></div>
      </div>
      <button class="restart-btn" onclick="restart()">🔄 Volver a intentar</button>
    </div>
  `;
  if (pct >= 85) bigBurst();
}

function restart() { cur = 0; score = 0; answered = false; render(); }

function burst() {
  const colors = ["#7F77DD","#1D9E75","#E24B4A","#BA7517","#378ADD","#639922"];
  for (let i = 0; i < 18; i++) {
    const el = document.createElement("div");
    el.className = "confetti-piece";
    const x = 25 + Math.random() * 50;
    el.style.cssText = `left:${x}%;top:0;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*9}px;height:${6+Math.random()*9}px;border-radius:${Math.random()>0.5?"50%":"3px"};animation-duration:${1+Math.random()*1.2}s;animation-delay:${Math.random()*0.3}s;`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2500);
  }
}

function bigBurst() {
  const colors = ["#7F77DD","#1D9E75","#E24B4A","#BA7517","#378ADD","#639922","#FAC775","#F0997B"];
  for (let i = 0; i < 70; i++) {
    setTimeout(() => {
      const el = document.createElement("div");
      el.className = "confetti-piece";
      el.style.cssText = `left:${Math.random()*100}%;top:0;background:${colors[Math.floor(Math.random()*colors.length)]};width:${5+Math.random()*11}px;height:${5+Math.random()*11}px;border-radius:${Math.random()>0.5?"50%":"3px"};animation-duration:${1.5+Math.random()*2}s;`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }, i * 40);
  }
}

render();
</script>
</body>
</html>
